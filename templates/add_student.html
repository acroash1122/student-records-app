{% extends "base.html" %}

{% block title %}Add Student - Student Records Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0">Add New Student</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('add_student') }}" id="add-student-form">

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Full Name</label>
                        <input type="text"
                               class="form-control"
                               id="name"
                               name="name"
                               placeholder="Enter full name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="roll_number" class="form-label fw-semibold">Roll Number</label>
                        <input type="text"
                               class="form-control"
                               id="roll_number"
                               name="roll_number"
                               placeholder="e.g., CS-2021-001"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               placeholder="student@university.edu"
                               required>
                    </div>

                    <div class="mb-4">
                        <label for="department" class="form-label fw-semibold">Department</label>
                        <select class="form-select" id="department" name="department" required>
                            <option value="">-- Select Department --</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Business Administration">Business Administration</option>
                            <option value="Mathematics">Mathematics</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success" id="submit-btn">Add Student</button>
                        <a href="{{ url_for('students') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
