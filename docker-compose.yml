services:

  # ── PostgreSQL 16 database ─────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: student_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ahsan@_123
      POSTGRES_DB: student_records_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Flask application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student_app
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: Ahsan@_123
      DB_NAME: student_records_db
      SECRET_KEY: change-this-in-production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # ── Selenium test runner (only starts with --profile test) ─────────────────
  selenium-tests:
    build:
      context: .
      dockerfile: Dockerfile.selenium
    container_name: selenium_runner
    environment:
      APP_URL: http://app:5000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - test

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
